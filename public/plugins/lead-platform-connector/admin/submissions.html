<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="icon" href="/favicon.ico">
	<base href="">
	<title>Vvveb - Lead submissions</title>
	<link href="css/admin.css" rel="stylesheet">
</head>

<body class="submissions">

	<div id="container">

		<div class="sidebar" data-v-copy-from="index.html,.sidebar"></div>

		<div class="main">

			<div class="clearfix top-header" data-v-copy-from="index.html,.top-header"></div>

			<form id="settings-form" action="" method="post" class="settings" data-v-lead_submission>
				<input type="hidden" name="action" id="action" value="save">
				<input type="hidden" name="csrf" data-v-csrf>

				<div class="actions">
					<div class="title">
						<h4 class="text-muted mt-2">
							<i class="icon-list-outline"></i>
							<span>Lead submissions</span>
							<small class="text-muted ms-2" data-v-count>0</small>
						</h4>
					</div>
					<div class="btns">
						<a href="/admin/index.php?module=plugins/lead-platform-connector/endpoints" title="Endpoints" class="btn btn-outline-secondary">
							<i class="la la-cog"></i><span>Endpoints</span>
						</a>
					</div>
				</div>

				<div id="main-content">

					<div class="notifications" data-v-notifications data-v-copy-from="index.html,.notifications"></div>

					<div class="content clearfix settings">

						<div class="table-responsive">
							<table class="table table-hover middle-align" data-v-lead_submissions>
								<thead>
									<tr>
										<th>#</th>
										<th>When</th>
										<th>Endpoint</th>
										<th>Status</th>
										<th>HTTP</th>
										<th>Lead ID</th>
										<th>Source</th>
										<th>IP</th>
										<th>Attempts</th>
									</tr>
								</thead>
								<tbody>
									<tr class="submission" data-v-lead_submission>
										<td><span data-v-lead_submission-lead_submission_id>0</span></td>
										<td class="small text-nowrap">
											<span data-v-lead_submission-created_at title="raw">date</span>
										</td>
										<td><code data-v-lead_submission-endpoint_slug>slug</code></td>
										<td>
											<span class="badge bg-success" data-v-if="lead_submission.status='sent'" data-v-lead_submission-status>sent</span>
											<span class="badge bg-info" data-v-if="lead_submission.status='duplicate'" data-v-lead_submission-status>duplicate</span>
											<span class="badge bg-warning text-dark" data-v-if="lead_submission.status='pending'" data-v-lead_submission-status>pending</span>
											<span class="badge bg-danger" data-v-if="lead_submission.status='failed'" data-v-lead_submission-status>failed</span>
										</td>
										<td><span data-v-lead_submission-http_status>—</span></td>
										<td class="small"><span data-v-lead_submission-platform_lead_id></span></td>
										<td class="small text-truncate" style="max-width:240px;"><span data-v-lead_submission-source_page></span></td>
										<td class="small"><span data-v-lead_submission-client_ip></span></td>
										<td><span data-v-lead_submission-attempts>0</span></td>
									</tr>
									<tr data-v-if-not="this.count > 0" class="no-items">
										<td colspan="100">
											<div class="text-center mb-4">
												<div>
													<i class="icon-list-outline display-4 lh-1 text-secondary text-opacity-75"></i>
													<div class="mt-3">No submissions yet.</div>
												</div>
											</div>
										</td>
									</tr>
								</tbody>
							</table>

							<div class="d-flex justify-content-end ">
								<div id="pagination" data-v-pagination data-v-copy-from="content/posts.html,#pagination"></div>
							</div>
						</div>

					</div>
				</div>
			</form>
		</div>

		<div id="main-footer" data-v-copy-from="index.html,#main-footer"></div>
	</div>

	<script src="js/popper.min.js"></script>
	<script src="js/bootstrap.min.js"></script>
	<script id="admin-js" type="module" src="/js/admin.js"></script>
</body>
</html>
